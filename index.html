<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日語常用單字卡 | Japanese Flashcards</title>
    <style>
        /* 匯入現代字體: 圓體日文、繁體中文和英文字體 */
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+TC:wght@400;700&family=Poppins:wght@400;600&display=swap');

        :root {
            /* 預設主題 (晚霞紅 Default) */
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #f43f5e;
            --primary-gradient: linear-gradient(135deg, #f43f5e, #fb923c);
            --button-active-bg: linear-gradient(135deg, #f43f5e, #fb923c);
            --primary-shadow: rgba(244, 63, 94, 0.3);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;

            --blob-1: rgba(244, 63, 94, 0.15);
            --blob-2: rgba(251, 146, 60, 0.15);
            --blob-3: rgba(56, 189, 248, 0.1);

            --card-back-grad: linear-gradient(135deg, rgba(244, 63, 94, 0.15) 0%, rgba(251, 146, 60, 0.05) 100%);
            --card-back-border: rgba(244, 63, 94, 0.3);

            --romaji-bg: rgba(244, 63, 94, 0.1);
            --romaji-color: var(--primary);
        }

        /* 玫瑰金 (Rose Gold) - 粉嫩版 */
        body.theme-rose {
            --bg-color: #1a1315;
            --primary: #f8a5c2;
            --primary-gradient: linear-gradient(135deg, #f8a5c2, #fad0c4);
            --button-active-bg: linear-gradient(135deg, #e387a3, #e8a696);
            --primary-shadow: rgba(227, 135, 163, 0.3);
            --blob-1: rgba(248, 165, 194, 0.2);
            --blob-2: rgba(250, 208, 196, 0.2);
            --blob-3: rgba(249, 168, 212, 0.15);
            --card-back-grad: linear-gradient(135deg, rgba(248, 165, 194, 0.15) 0%, rgba(250, 208, 196, 0.05) 100%);
            --card-back-border: rgba(248, 165, 194, 0.4);
            --romaji-bg: rgba(248, 165, 194, 0.15);
            --romaji-color: var(--primary);
        }

        /* 天空藍 (Sky Blue) - 客製 #87ceeb */
        body.theme-skyblue {
            --bg-color: #0b141e;
            --primary: #87ceeb;
            --primary-gradient: linear-gradient(135deg, #79bfda, #93cce2);
            --button-active-bg: linear-gradient(135deg, #63b2d2, #6bb1cd);
            --primary-shadow: rgba(135, 206, 235, 0.3);
            --blob-1: rgba(135, 206, 235, 0.2);
            --blob-2: rgba(135, 206, 235, 0.15);
            --blob-3: rgba(135, 206, 235, 0.1);
            --card-back-grad: linear-gradient(135deg, rgba(135, 206, 235, 0.15) 0%, rgba(135, 206, 235, 0.05) 100%);
            --card-back-border: rgba(135, 206, 235, 0.4);
            --romaji-bg: rgba(135, 206, 235, 0.15);
            --romaji-color: var(--primary);
        }

        /* 抹茶綠 (Matcha) */
        body.theme-matcha {
            --bg-color: #0d1a15;
            --primary: #10b981;
            --primary-gradient: linear-gradient(135deg, #10b981, #84cc16);
            --button-active-bg: linear-gradient(135deg, #10b981, #84cc16);
            --primary-shadow: rgba(16, 185, 129, 0.3);
            --blob-1: rgba(16, 185, 129, 0.15);
            --blob-2: rgba(132, 204, 22, 0.15);
            --blob-3: rgba(52, 211, 153, 0.1);
            --card-back-grad: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, rgba(132, 204, 22, 0.05) 100%);
            --card-back-border: rgba(16, 185, 129, 0.3);
            --romaji-bg: rgba(16, 185, 129, 0.15);
            --romaji-color: var(--primary);
        }


        body {
            margin: 0;
            padding: 3rem 1.5rem;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 10% 10%, var(--blob-1) 0%, transparent 40%),
                radial-gradient(circle at 90% 20%, var(--blob-2) 0%, transparent 40%),
                radial-gradient(circle at 50% 90%, var(--blob-3) 0%, transparent 50%);
            background-attachment: fixed;
            font-family: 'Noto Sans TC', 'Poppins', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 3.5rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.8rem;
            margin: 0 0 0.8rem 0;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.15rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 1rem;
            color: var(--text-muted);
            animation: fadeInDown 0.8s ease-out 0.2s both;
        }

        .category-tabs {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .category-tab {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        @media (hover: hover) {
            .category-tab:hover {
                color: var(--text-main);
            }
        }

        .category-tab.active {
            background: var(--button-active-bg);
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 10px var(--primary-shadow);
        }

        .speed-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: border-color 0.3s;
        }

        .speed-select:hover,
        .speed-select:focus {
            border-color: var(--primary);
        }

        .speed-select option {
            background: var(--bg-color);
            color: var(--text-main);
        }

        .flashcards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
            width: 100%;
            max-width: 1100px;
        }

        .scene {
            perspective: 1200px;
            height: 320px;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease-out forwards;
        }

        /* 移除固定的nth-child動畫延遲，改為由JS動態生成 */

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .scene:hover .card {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transform: translateY(-8px);
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .scene:hover .card.is-flipped {
            transform: translateY(-8px) rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem 2rem 3.5rem 2rem;
            box-sizing: border-box;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .card-front {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
        }

        .card-back {
            transform: rotateY(180deg);
            background: var(--card-back-grad);
            border-color: var(--card-back-border);
        }

        .voice-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.3s ease;
            z-index: 10;
        }

        @media (hover: hover) {
            .voice-btn:hover {
                background: var(--primary);
                border-color: var(--primary);
                color: white;
                transform: scale(1.1);
            }
        }

        .voice-btn svg {
            width: 22px;
            height: 22px;
        }

        .kana {
            font-family: 'Kosugi Maru', sans-serif;
            font-size: 2.5rem;
            margin: 0 0 1rem 0;
            text-align: center;
            line-height: 1.3;
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .romaji {
            font-family: 'Poppins', sans-serif;
            font-size: 1.15rem;
            color: var(--romaji-color);
            letter-spacing: 2px;
            font-weight: 600;
            text-transform: lowercase;
            padding: 6px 16px;
            background: var(--romaji-bg);
            border-radius: 20px;
        }

        .meaning {
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
        }

        .example-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            width: 100%;
            text-align: left;
            border-left: 4px solid var(--primary);
            box-sizing: border-box;
        }

        .example-ja {
            font-family: 'Kosugi Maru', sans-serif;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #fff;
            letter-spacing: 1px;
        }

        .example-zh {
            font-size: 0.95rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .hint {
            position: absolute;
            bottom: 16px;
            font-size: 0.9rem;
            color: var(--text-muted);
            opacity: 0.6;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Noto Sans TC', sans-serif;
            transition: opacity 0.3s ease;
        }

        .card:hover .hint {
            opacity: 1;
        }

        .hint svg {
            width: 18px;
            height: 18px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* UI Views Management */
        .view-section {
            display: none;
            width: 100%;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .view-section.active-view {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .nav-tab {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 10px 24px;
            border-radius: 30px;
            font-family: inherit;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        @media (hover: hover) {
            .nav-tab:hover {
                background: rgba(255, 255, 255, 0.1);
                color: var(--text-main);
            }
        }

        .nav-tab.active {
            background: var(--button-active-bg);
            color: white;
            font-weight: 600;
            border-color: transparent;
            box-shadow: 0 4px 15px var(--primary-shadow);
        }

        /* Quiz Layout */
        .quiz-container {
            max-width: 800px;
            width: 100%;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-sizing: border-box;
        }

        .quiz-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        .quiz-question {
            font-family: 'Kosugi Maru', sans-serif;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .quiz-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            padding: 1.2rem;
            border-radius: 16px;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
        }

        @media (hover: hover) {
            .quiz-btn:hover:not(:disabled) {
                background: rgba(255, 255, 255, 0.15);
                transform: translateY(-3px);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            }
        }

        .quiz-btn.correct {
            background: #10b981 !important;
            border-color: #059669 !important;
            color: white;
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }

        .quiz-btn.wrong {
            background: #ef4444 !important;
            border-color: #dc2626 !important;
            color: white;
        }

        .quiz-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Results Layout */
        .results-container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .results-score {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--primary);
        }

        /* 響應式設計 */
        @media (max-width: 600px) {
            .quiz-options {
                grid-template-columns: 1fr;
            }

            .quiz-container {
                padding: 1.5rem;
            }

            .quiz-question {
                font-size: 2.2rem;
            }

            h1 {
                font-size: 2.2rem;
            }

            .kana {
                font-size: 2rem;
            }

            .meaning {
                font-size: 1.8rem;
            }

            .flashcards-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .scene {
                height: 300px;
            }

            .card-face {
                padding: 1.5rem 1.5rem 3rem 1.5rem;
            }

            body {
                padding: 2rem 1rem;
            }

            /* 優化手機端排版，防止選單超出螢幕 */
            .controls {
                flex-direction: column;
                gap: 1.5rem;
            }

            .category-tabs {
                flex-wrap: wrap;
                justify-content: center;
            }

            .nav-tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>基礎日文單字卡</h1>
        <p class="subtitle">點擊卡片翻面，測試你的記憶力 ✨</p>

        <div class="nav-tabs" id="nav-tabs">
            <button class="nav-tab active" data-view="flashcards-view"
                onclick="switchView('flashcards-view')">單字卡學習</button>
            <button class="nav-tab" data-view="quiz-view" onclick="startQuiz()">隨機測驗</button>
        </div>

        <div class="controls" id="flashcards-controls">
            <div class="category-tabs" id="category-tabs">
                <button class="category-tab active" data-category="greetings">日常問候</button>
                <button class="category-tab" data-category="numbers">基礎數字</button>
                <button class="category-tab" data-category="fruits">常見水果</button>
            </div>

            <div style="display: flex; align-items: center; gap: 10px;">
                <label for="speed-select">語音速度：</label>
                <select id="speed-select" class="speed-select">
                    <option value="0.5">慢速 (0.5x)</option>
                    <option value="1" selected>正常 (1.0x)</option>
                    <option value="1.2">快速 (1.2x)</option>
                </select>
            </div>

            <div style="display: flex; align-items: center; gap: 10px;">
                <label for="theme-select">主題色調：</label>
                <select id="theme-select" class="speed-select">
                    <option value="default">晚霞紅 (預設)</option>
                    <option value="theme-rose">玫瑰金</option>
                    <option value="theme-skyblue">天空藍</option>
                    <option value="theme-matcha">抹茶綠</option>
                </select>
            </div>
        </div>
    </header>

    <div class="view-section active-view" id="flashcards-view">
        <div class="flashcards-container" id="flashcards-container-element">
            <!-- 卡片將由 JavaScript 動態生成 -->
            <div
                style="grid-column: 1 / -1; text-align: center; background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; padding: 2rem; border-radius: 16px; margin: 2rem 0; width: 100%;">
                <h3 style="color: #fca5a5; margin-bottom: 1rem;">⚠️ 瀏覽環境限制提示</h3>
                <p style="color: #f8fafc; font-size: 1.1rem; line-height: 1.6;">
                    如果您看到這段文字，代表您目前使用的是 <strong>Gmail 或通訊軟體的「內建預覽模式」</strong>。<br>
                    為了資訊安全，信箱會自動阻擋所有程式碼運作，導致單字卡無法顯示與點擊。
                </p>
                <p
                    style="color: #f8fafc; font-size: 1.1rem; margin-top: 1rem; font-weight: bold; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 8px; line-height: 1.6;">
                    由於手機系統（特別是 iOS）嚴格限制執行下載的本地網頁檔，無法順利切換至瀏覽器執行。<br>
                    為了能正常體驗完整的單字卡測驗、語音等互動功能，<span style="color: #38bdf8;">請您點擊開啟連結：<br>
                        <a href="https://crimson-marje-6.tiiny.site/" target="_blank" style="color: #38bdf8; text-decoration: underline; word-break: break-all;">https://crimson-marje-6.tiiny.site/</a><br>
                        即可完美運作！</span>
                </p>
            </div>
        </div>
    </div>

    <div class="view-section" id="quiz-view">
        <div class="quiz-container">
            <div class="quiz-header-bar">
                <span id="quiz-progress">第 1 / 10 題</span>
                <span id="quiz-score">得分：0</span>
            </div>
            <div class="quiz-question" id="quiz-question"></div>
            <div class="quiz-options" id="quiz-options">
                <!-- 選項 -->
            </div>
        </div>
    </div>

    <div class="view-section" id="results-view">
        <div class="results-container">
            <h2>測驗結束！</h2>
            <div class="results-score" id="results-score-text">您的成績：0 / 10</div>

            <div id="wrong-words-section" style="display: none;">
                <h3 style="margin: 2rem 0; color: var(--text-muted); font-weight: normal;">需要加強的單字</h3>
                <div class="flashcards-container" id="wrong-cards-container">
                </div>
            </div>

            <button class="nav-tab active" style="margin-top: 3rem;"
                onclick="switchView('flashcards-view')">返回單字卡</button>
            <button class="nav-tab" style="margin-top: 3rem; background: var(--card-bg);"
                onclick="startQuiz()">再測驗一次</button>
        </div>
    </div>

    <script>
        // 定義日常用語單字庫 (按分類)
        const vocabularyData = {
            greetings: [
                { kana: 'おはようございます', romaji: 'ohayou gozaimasu', meaning: '早安', example_ja: '先生、おはようございます。', example_zh: '老師，早安。' },
                { kana: 'こんにちは', romaji: 'konnichiwa', meaning: '你好 / 午安', example_ja: 'みなさん、こんにちは。', example_zh: '大家好。' },
                { kana: 'こんばんは', romaji: 'konbanwa', meaning: '晚安', example_ja: 'こんばんは、いい天気ですね。', example_zh: '晚安，天氣真好呢。' },
                { kana: 'ありがとうございます', romaji: 'arigatou gozaimasu', meaning: '謝謝', example_ja: '手伝ってくれて、ありがとうございます。', example_zh: '謝謝你的幫忙。' },
                { kana: 'さようなら', romaji: 'sayounara', meaning: '再見', example_ja: 'じゃあ、さようなら。', example_zh: '那麼，再見囉。' },
                { kana: 'すみません', romaji: 'sumimasen', meaning: '不好意思 / 抱歉', example_ja: 'すみません、道を教えてください。', example_zh: '不好意思，請告訴我路怎麼走。' }
            ],
            numbers: [
                { kana: 'いち', romaji: 'ichi', meaning: '一 (1)', example_ja: '一つお願いします。', example_zh: '麻煩給我一個。' },
                { kana: 'に', romaji: 'ni', meaning: '二 (2)', example_ja: '二階にあります。', example_zh: '在二樓。' },
                { kana: 'さん', romaji: 'san', meaning: '三 (3)', example_ja: 'りんごを三個買いました。', example_zh: '買了三顆蘋果。' },
                { kana: 'よん', romaji: 'yon', meaning: '四 (4)', example_ja: '四人家族です。', example_zh: '一家有四口人。' },
                { kana: 'ご', romaji: 'go', meaning: '五 (5)', example_ja: '五分待ってください。', example_zh: '請等五分鐘。' },
                { kana: 'ろく', romaji: 'roku', meaning: '六 (6)', example_ja: '六時におきましょう。', example_zh: '六點起床吧。' },
                { kana: 'なな', romaji: 'nana', meaning: '七 (7)', example_ja: '七月はあついですね。', example_zh: '七月很熱呢。' },
                { kana: 'はち', romaji: 'hachi', meaning: '八 (8)', example_ja: '八時に出発します。', example_zh: '八點出發。' },
                { kana: 'きゅう', romaji: 'kyuu', meaning: '九 (9)', example_ja: '今日は九日です。', example_zh: '今天是九號。' },
                { kana: 'じゅう', romaji: 'juu', meaning: '十 (10)', example_ja: '十円玉を持っていますか。', example_zh: '你有十日圓硬幣嗎？' }
            ],
            fruits: [
                { kana: 'りんご', romaji: 'ringo', meaning: '蘋果', example_ja: 'りんごが大好きです。', example_zh: '我非常喜歡吃蘋果。' },
                { kana: 'みかん', romaji: 'mikan', meaning: '橘子', example_ja: '冬はよくみかんを食べます。', example_zh: '冬天常常吃橘子。' },
                { kana: 'いちご', romaji: 'ichigo', meaning: '草莓', example_ja: '甘いいちごですね。', example_zh: '好甜的草莓呢。' },
                { kana: 'すいか', romaji: 'suika', meaning: '西瓜', example_ja: '夏休みにすいかを食べました。', example_zh: '暑假吃了西瓜。' },
                { kana: 'ぶどう', romaji: 'budou', meaning: '葡萄', example_ja: 'このぶどうは美味しいです。', example_zh: '這個葡萄很好吃。' },
                { kana: 'もも', romaji: 'momo', meaning: '桃子', example_ja: 'ももの香りがいいです。', example_zh: '桃子的香氣很好。' },
                { kana: 'バナナ', romaji: 'banana', meaning: '香蕉', example_ja: '朝ごはんにバナナを食べます。', example_zh: '早餐吃香蕉。' }
            ]
        };

        const container = document.getElementById('flashcards-container-element');

        function renderCards(category) {
            container.innerHTML = ''; // 清空現有卡片
            const list = vocabularyData[category];

            list.forEach((vocab, index) => {
                // 建立 3D 場景容器
                const scene = document.createElement('div');
                scene.className = 'scene';
                // 動態設定延遲時間，確保第一張最先出現
                scene.style.animationDelay = `${index * 0.1}s`;

                // 建立卡片本體
                const card = document.createElement('div');
                card.className = 'card';

                // 加入點擊翻轉事件
                scene.addEventListener('click', () => {
                    card.classList.toggle('is-flipped');
                });

                // 如果假名太長，在適當位置加上換行 (<br>)
                const formattedKana = vocab.kana.length > 7 ?
                    vocab.kana.replace('ござい', '<br>ござい') : vocab.kana;

                // 建立正面（日文）
                const front = document.createElement('div');
                front.className = 'card-face card-front';
                front.innerHTML = `
                    <button class="voice-btn" aria-label="聆聽發音" title="聆聽發音">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
                        </svg>
                    </button>
                    <div class="kana">${formattedKana}</div>
                    <div class="romaji">${vocab.romaji}</div>
                    <div class="hint">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
                        </svg>
                        點擊翻面
                    </div>
                `;

                // 設定語音按鈕事件
                const voiceBtn = front.querySelector('.voice-btn');
                voiceBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); // 防止點擊按鈕時觸發卡片翻轉

                    if ('speechSynthesis' in window) {
                        // 停止當前正在播放的語音（連續點擊時不會重疊播放）
                        window.speechSynthesis.cancel();

                        // 獲取當前所選的語速
                        const speedSelect = document.getElementById('speed-select');
                        const selectedRate = parseFloat(speedSelect.value);

                        // 去除 kana 中可能包含的 <br> 標籤，不會影響讀音
                        const cleanKana = vocab.kana.replace(/<br>/g, '');
                        const utterance = new SpeechSynthesisUtterance(cleanKana);
                        utterance.lang = 'ja-JP';
                        utterance.rate = selectedRate; // 根據選擇設定語速

                        window.speechSynthesis.speak(utterance);
                    } else {
                        alert('您的瀏覽器不支援語音朗讀功能');
                    }
                });

                // 建立背面（中文與例句）
                const back = document.createElement('div');
                back.className = 'card-face card-back';
                back.innerHTML = `
                    ${vocab.example_ja ? `
                    <button class="voice-btn example-voice-btn" aria-label="聆聽例句發音" title="聆聽例句發音">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
                        </svg>
                    </button>
                    ` : ''}
                    <div class="meaning">${vocab.meaning}</div>
                    ${vocab.example_ja ? `
                    <div class="example-box">
                        <div class="example-ja">${vocab.example_ja}</div>
                        <div class="example-zh">${vocab.example_zh}</div>
                    </div>
                    ` : ''}
                    <div class="hint">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3" />
                        </svg>
                        翻回正面
                    </div>
                `;

                // 設定背面例句語音按鈕事件
                const exampleVoiceBtn = back.querySelector('.example-voice-btn');
                if (exampleVoiceBtn && vocab.example_ja) {
                    exampleVoiceBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if ('speechSynthesis' in window) {
                            window.speechSynthesis.cancel();
                            const speedSelect = document.getElementById('speed-select');
                            const selectedRate = parseFloat(speedSelect.value);
                            const cleanExampleKana = vocab.example_ja.replace(/<br>/g, '');
                            const utterance = new SpeechSynthesisUtterance(cleanExampleKana);
                            utterance.lang = 'ja-JP';
                            utterance.rate = selectedRate;
                            window.speechSynthesis.speak(utterance);
                        } else {
                            alert('您的瀏覽器不支援語音朗讀功能');
                        }
                    });
                }

                // 將正反面加入卡片，再將卡片加入場景，最後渲染到畫面上
                card.appendChild(front);
                card.appendChild(back);
                scene.appendChild(card);
                container.appendChild(scene);
            });
        }

        // 綁定分類標籤點擊事件
        const categoryTabs = document.querySelectorAll('.category-tab');
        categoryTabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                // 更新標籤樣式
                categoryTabs.forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');

                // 重新渲染卡片
                const selectedCategory = e.target.dataset.category;
                renderCards(selectedCategory);
            });
        });

        // ==========================
        // UI Views Management
        // ==========================
        function switchView(viewId) {
            // Update tabs
            document.querySelectorAll('.nav-tab').forEach(tab => {
                if (tab.dataset.view) {
                    if (tab.dataset.view === viewId) tab.classList.add('active');
                    else tab.classList.remove('active');
                }
            });

            // Update views
            document.querySelectorAll('.view-section').forEach(view => {
                view.classList.remove('active-view');
            });
            document.getElementById(viewId).classList.add('active-view');

            // Show/hide controls
            const controls = document.getElementById('flashcards-controls');
            if (viewId === 'flashcards-view') controls.style.display = 'flex';
            else controls.style.display = 'none';

            // Stop any ongoing speech if supported
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
        }

        // ==========================
        // Sound Effects (Web Audio API)
        // ==========================
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, vol = 0.1) {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = type;
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);

            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function playCorrectSound() {
            playTone(600, 'sine', 0.1, 0.15);
            setTimeout(() => playTone(800, 'sine', 0.15, 0.15), 100);
        }

        function playWrongSound() {
            playTone(250, 'square', 0.2, 0.05);
            setTimeout(() => playTone(200, 'square', 0.3, 0.05), 150);
        }

        function playPerfectSound() {
            const freqs = [523.25, 659.25, 783.99, 1046.50];
            freqs.forEach((freq, idx) => {
                setTimeout(() => playTone(freq, 'sine', 0.2, 0.15), idx * 100);
            });
        }

        // ==========================
        // Quiz Logic
        // ==========================
        let allWords = [];
        let quizQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let wrongWords = [];

        function gatherAllWords() {
            let combined = [];
            Object.values(vocabularyData).forEach(list => {
                combined = combined.concat(list);
            });
            return combined;
        }

        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        function startQuiz() {
            switchView('quiz-view');
            allWords = gatherAllWords();
            let shuffled = shuffleArray([...allWords]);
            quizQuestions = shuffled.slice(0, 10); // Pick 10 random

            currentQuestionIndex = 0;
            score = 0;
            wrongWords = [];

            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestionIndex >= quizQuestions.length) {
                showResults();
                return;
            }

            const q = quizQuestions[currentQuestionIndex];

            document.getElementById('quiz-progress').innerText = `第 ${currentQuestionIndex + 1} / 10 題`;
            document.getElementById('quiz-score').innerText = `得分：${score}`;
            document.getElementById('quiz-question').innerHTML = q.kana.replace('<br>', '');

            // Pronounce question
            window.speechSynthesis.cancel();
            const speedSelect = document.getElementById('speed-select');
            const utterance = new SpeechSynthesisUtterance(q.kana.replace(/<br>/g, ''));
            utterance.lang = 'ja-JP';
            utterance.rate = speedSelect ? parseFloat(speedSelect.value) : 1;
            window.speechSynthesis.speak(utterance);

            // Generate options (1 correct, 3 distractors)
            let distractors = allWords.filter(w => w.meaning !== q.meaning);
            distractors = shuffleArray(distractors).slice(0, 3);
            let options = [q, ...distractors];
            options = shuffleArray(options);

            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'quiz-btn';
                btn.innerText = opt.meaning;
                btn.onclick = () => handleAnswer(btn, opt.meaning === q.meaning, q);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(btnElement, isCorrect, correctWordObj) {
            const allBtns = document.querySelectorAll('.quiz-btn');
            allBtns.forEach(b => b.disabled = true);

            if (isCorrect) {
                playCorrectSound();
                btnElement.classList.add('correct');
                score++;
                document.getElementById('quiz-score').innerText = `得分：${score}`;
                setTimeout(() => {
                    currentQuestionIndex++;
                    loadQuestion();
                }, 1000); // 1s delay
            } else {
                playWrongSound();
                btnElement.classList.add('wrong');
                if (!wrongWords.includes(correctWordObj)) {
                    wrongWords.push(correctWordObj);
                }
                // Highlight correct one
                allBtns.forEach(b => {
                    if (b.innerText === correctWordObj.meaning) b.classList.add('correct');
                });
                setTimeout(() => {
                    currentQuestionIndex++;
                    loadQuestion();
                }, 2000); // 2s delay to learn correct answer
            }
        }

        function showResults() {
            switchView('results-view');
            document.getElementById('results-score-text').innerText = `您的成績：${score} / 10`;

            if (score === 10) {
                playPerfectSound();
            }

            const wrongSection = document.getElementById('wrong-words-section');
            const wrongContainer = document.getElementById('wrong-cards-container');

            if (wrongWords.length > 0) {
                wrongSection.style.display = 'block';
                wrongContainer.innerHTML = '';

                wrongWords.forEach((vocab, index) => {
                    const scene = document.createElement('div');
                    scene.className = 'scene';
                    scene.style.animationDelay = `${index * 0.1}s`;
                    const card = document.createElement('div');
                    card.className = 'card';
                    scene.addEventListener('click', () => card.classList.toggle('is-flipped'));

                    const formattedKana = vocab.kana.length > 7 ? vocab.kana.replace('ござい', '<br>ござい') : vocab.kana;

                    const front = document.createElement('div');
                    front.className = 'card-face card-front';
                    front.innerHTML = `
                        <button class="voice-btn" aria-label="聆聽發音" title="聆聽發音">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
                            </svg>
                        </button>
                        <div class="kana">${formattedKana}</div>
                        <div class="romaji">${vocab.romaji}</div>
                        <div class="hint">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
                            </svg>
                            點擊翻面
                        </div>
                    `;
                    const voiceBtn = front.querySelector('.voice-btn');
                    voiceBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        window.speechSynthesis.cancel();
                        const speedSelect = document.getElementById('speed-select');
                        const utterance = new SpeechSynthesisUtterance(vocab.kana.replace(/<br>/g, ''));
                        utterance.lang = 'ja-JP';
                        utterance.rate = speedSelect ? parseFloat(speedSelect.value) : 1;
                        window.speechSynthesis.speak(utterance);
                    });

                    const back = document.createElement('div');
                    back.className = 'card-face card-back';
                    back.innerHTML = `
                        ${vocab.example_ja ? `
                        <button class="voice-btn example-voice-btn" aria-label="聆聽例句發音" title="聆聽例句發音">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
                            </svg>
                        </button>
                        ` : ''}
                        <div class="meaning">${vocab.meaning}</div>
                        ${vocab.example_ja ? `
                        <div class="example-box">
                            <div class="example-ja">${vocab.example_ja}</div>
                            <div class="example-zh">${vocab.example_zh}</div>
                        </div>
                        ` : ''}
                        <div class="hint">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3" />
                            </svg>
                            翻回正面
                        </div>
                    `;
                    const exampleVoiceBtn = back.querySelector('.example-voice-btn');
                    if (exampleVoiceBtn && vocab.example_ja) {
                        exampleVoiceBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if ('speechSynthesis' in window) {
                                window.speechSynthesis.cancel();
                                const speedSelect = document.getElementById('speed-select');
                                const utterance = new SpeechSynthesisUtterance(vocab.example_ja.replace(/<br>/g, ''));
                                utterance.lang = 'ja-JP';
                                utterance.rate = speedSelect ? parseFloat(speedSelect.value) : 1;
                                window.speechSynthesis.speak(utterance);
                            } else {
                                alert('您的瀏覽器不支援語音朗讀功能');
                            }
                        });
                    }

                    card.appendChild(front);
                    card.appendChild(back);
                    scene.appendChild(card);
                    wrongContainer.appendChild(scene);
                });
            } else {
                wrongSection.style.display = 'none';
            }
        }

        // ==========================
        // Theme Management
        // ==========================
        function applyTheme(themeName) {
            document.body.className = themeName === 'default' ? '' : themeName;
            try {
                localStorage.setItem('japanese-flashcards-theme', themeName);
            } catch (e) {
                console.warn('LocalStorage is not available:', e);
            }
        }

        document.getElementById('theme-select').addEventListener('change', (e) => {
            applyTheme(e.target.value);
        });

        // 載入保存的主題
        function loadSavedTheme() {
            try {
                let savedTheme = localStorage.getItem('japanese-flashcards-theme');
                if (savedTheme === 'theme-hydrangea') {
                    savedTheme = 'theme-skyblue'; // 舊版本相容
                    localStorage.setItem('japanese-flashcards-theme', savedTheme);
                }
                if (savedTheme === 'theme-obsidian') {
                    savedTheme = 'default'; // 廢棄主題相容
                    localStorage.removeItem('japanese-flashcards-theme');
                }
                if (savedTheme) {
                    document.getElementById('theme-select').value = savedTheme;
                    applyTheme(savedTheme);
                }
            } catch (e) {
                console.warn('LocalStorage is not available:', e);
            }
        }

        // 初始載入預設的日常問候分類與主題
        loadSavedTheme();
        switchView('flashcards-view');
        renderCards('greetings');
    </script>
